<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 草方块顶部 (绿色) -->
  <rect x="0" y="0" width="32" height="16" fill="#5D9B3F"/>
  <!-- 草方块顶部纹理 -->
  <rect x="4" y="2" width="4" height="4" fill="#7CBD6B"/>
  <rect x="12" y="4" width="4" height="4" fill="#4A8C3F"/>
  <rect x="20" y="2" width="6" height="6" fill="#7CBD6B"/>
  <rect x="28" y="6" width="4" height="4" fill="#5D9B3F"/>
  <!-- 草方块底部 (泥土色) -->
  <rect x="0" y="16" width="32" height="16" fill="#866043"/>
  <!-- 泥土纹理 -->
  <rect x="4" y="18" width="4" height="4" fill="#6B4C31"/>
  <rect x="12" y="20" width="4" height="4" fill="#9C7B5A"/>
  <rect x="20" y="18" width="6" height="6" fill="#6B4C31"/>
  <rect x="28" y="22" width="4" height="4" fill="#866043"/>
  <!-- 边框 -->
  <rect x="0" y="0" width="32" height="32" fill="none" stroke="#2D5A27" stroke-width="2"/>
</svg>