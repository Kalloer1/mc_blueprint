<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub 登录回调</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .callback-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(0, 0, 0, 0.1);
      border-top: 4px solid #24292e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1.5rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .callback-container p {
      color: #555;
      font-size: 1rem;
    }

    #callback-error {
      display: none;
      color: #d32f2f;
      background-color: #fdecea;
      border: 1px solid #ef9a9a;
      border-radius: 6px;
      padding: 1rem 1.5rem;
      margin-top: 1.5rem;
      max-width: 400px;
      text-align: center;
      font-size: 0.95rem;
    }

    .success-icon {
      width: 64px;
      height: 64px;
      background: #27ae60;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .success-icon svg {
      width: 40px;
      height: 40px;
      fill: white;
    }
  </style>
</head>
<body>
  <div class="callback-container">
    <div class="spinner" id="spinner"></div>
    <p id="status-text">正在处理 GitHub 登录...</p>
    <div id="callback-error"></div>
  </div>

  <script src="../js/auth.js"></script>
</body>
</html>
