<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 - MC蓝图工坊</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: #1a1a2e;
      min-height: 100vh;
    }

    .navbar {
      background: rgba(30, 30, 50, 0.95);
    }

    .profile-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
    }

    .profile-card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 2rem;
      border: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 2rem;
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.2);
      object-fit: cover;
    }

    .profile-info h2 {
      color: #fff;
      margin: 0 0 0.25rem 0;
      font-size: 1.5rem;
    }

    .profile-info .bio {
      color: #999;
      margin: 0;
      font-size: 0.9rem;
    }

    .profile-info .meta {
      color: #666;
      font-size: 0.85rem;
      margin-top: 0.5rem;
    }

    .profile-info a {
      color: #4af5e6;
      text-decoration: none;
    }

    .profile-info a:hover {
      text-decoration: underline;
    }

    .section-title {
      color: #fff;
      font-size: 1.2rem;
      margin: 0 0 1rem 0;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: rgba(255,255,255,0.03);
      padding: 1.25rem;
      border-radius: 12px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .stat-card .num {
      font-size: 1.8rem;
      font-weight: bold;
      color: #4af5e6;
    }

    .stat-card .label {
      font-size: 0.85rem;
      color: #999;
      margin-top: 0.25rem;
    }

    .blueprint-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .blueprint-item {
      background: rgba(255,255,255,0.03);
      padding: 1rem;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: border-color 0.2s;
    }

    .blueprint-item:hover {
      border-color: rgba(255,255,255,0.15);
    }

    .blueprint-item .bp-info h4 {
      color: #fff;
      margin: 0 0 0.25rem 0;
      font-size: 1rem;
    }

    .blueprint-item .bp-info .bp-meta {
      color: #888;
      font-size: 0.8rem;
    }

    .blueprint-item .bp-status {
      font-size: 0.8rem;
      padding: 0.25rem 0.75rem;
      border-radius: 12px;
    }

    .bp-status.approved {
      background: rgba(39, 174, 96, 0.15);
      color: #27ae60;
    }

    .bp-status.pending {
      background: rgba(241, 196, 15, 0.15);
      color: #f1c40f;
    }

    .btn-logout {
      display: inline-block;
      padding: 0.5rem 1.5rem;
      background: rgba(231, 76, 60, 0.15);
      color: #e74c3c;
      border: 1px solid rgba(231, 76, 60, 0.3);
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn-logout:hover {
      background: rgba(231, 76, 60, 0.25);
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #999;
    }

    .empty-state .empty-icon {
      font-size: 3rem;
      opacity: 0.3;
      margin-bottom: 1rem;
    }

    .login-prompt {
      text-align: center;
      padding: 4rem;
    }

    .login-prompt .empty-icon {
      font-size: 4rem;
      opacity: 0.3;
      margin-bottom: 1rem;
    }

    .login-prompt h3 {
      color: #fff;
      margin: 0 0 0.5rem 0;
    }

    .login-prompt p {
      color: #999;
      margin: 0 0 1.5rem 0;
    }

    .loading-state {
      text-align: center;
      padding: 4rem;
    }

    .loading-state .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid #4af5e6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-state p {
      color: #999;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="./" class="nav-logo">
      <div class="logo-icon"></div>
      <span class="logo-text">MC<span>蓝图</span>工坊</span>
    </a>
    <ul class="nav-links">
      <li><a href="./">蓝图库</a></li>
      <li><a href="./converter.html">格式转换</a></li>
      <li><a href="./upload.html">上传蓝图</a></li>
      <li><a href="./profile.html" class="active">个人中心</a></li>
    </ul>
    <div id="nav-user"></div>
  </nav>

  <div class="profile-container" id="profile-content">
    <div class="loading-state">
      <div class="spinner"></div>
      <p>加载中...</p>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    const AUTH_WORKER_URL = 'https://qq-auth.wqclo.workers.dev';

    function renderProfile() {
      var container = document.getElementById('profile-content');
      var userData = localStorage.getItem('user');

      if (!userData) {
        container.innerHTML = `
          <div class="login-prompt">
            <div class="empty-icon">🔒</div>
            <h3>请先登录</h3>
            <p>登录后即可查看个人中心</p>
            <a href="javascript:void(0)" class="btn-login" onclick="loginWithGitHub()" style="display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: #24292e; color: #fff; border-radius: 6px; font-size: 14px; text-decoration: none;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
              GitHub 登录
            </a>
          </div>
        `;
        return;
      }

      try {
        var user = JSON.parse(userData);
      } catch (e) {
        container.innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div><h3>数据解析失败</h3></div>';
        return;
      }

      container.innerHTML = `
        <div class="profile-card">
          <div class="profile-header">
            <img class="profile-avatar" src="${user.avatar || ''}" alt="${user.nickname || '用户'}" onerror="this.src='assets/favicon.svg'">
            <div class="profile-info">
              <h2>${user.nickname || '未知用户'}</h2>
              <p class="bio">${user.bio || '这个人很懒，什么都没写'}</p>
              <p class="meta">
                登录平台: GitHub · 
                <a href="${user.github_url || '#'}" target="_blank" rel="noopener noreferrer">GitHub 主页</a>
              </p>
              <p class="meta">登录时间: ${user.login_time ? new Date(user.login_time).toLocaleString('zh-CN') : '未知'}</p>
            </div>
          </div>
          <a href="javascript:void(0)" class="btn-logout" onclick="logout()">退出登录</a>
        </div>

        <div class="stats-row">
          <div class="stat-card">
            <div class="num" id="my-upload-count">-</div>
            <div class="label">我的上传</div>
          </div>
          <div class="stat-card">
            <div class="num" id="my-approved-count">-</div>
            <div class="label">已通过</div>
          </div>
          <div class="stat-card">
            <div class="num" id="my-pending-count">-</div>
            <div class="label">待审核</div>
          </div>
        </div>

        <h3 class="section-title">我的蓝图</h3>
        <div class="blueprint-list" id="my-blueprints">
          <div class="loading-state" style="padding: 2rem;"><div class="spinner"></div><p>加载中...</p></div>
        </div>
      `;

      loadMyBlueprints(user.id);
    }

    async function loadMyBlueprints(userId) {
      var listEl = document.getElementById('my-blueprints');
      if (!userId) {
        listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>无法获取用户信息</p></div>';
        return;
      }

      try {
        var response = await fetch(AUTH_WORKER_URL + '/api/user/blueprints?user_id=' + encodeURIComponent(userId));
        var data = await response.json();

        if (!data.success) {
          listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>暂无上传记录</p></div>';
          document.getElementById('my-upload-count').textContent = '0';
          document.getElementById('my-approved-count').textContent = '0';
          document.getElementById('my-pending-count').textContent = '0';
          return;
        }

        var blueprints = data.blueprints || [];
        var approved = blueprints.filter(function(b) { return b.is_approved; });
        var pending = blueprints.filter(function(b) { return !b.is_approved; });

        document.getElementById('my-upload-count').textContent = blueprints.length;
        document.getElementById('my-approved-count').textContent = approved.length;
        document.getElementById('my-pending-count').textContent = pending.length;

        if (blueprints.length === 0) {
          listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>还没有上传过蓝图</p><a href="./upload.html" style="color: #4af5e6;">去上传</a></div>';
          return;
        }

        listEl.innerHTML = '';

        blueprints.forEach(function(bp) {
          var item = document.createElement('div');
          item.className = 'blueprint-item';
          item.innerHTML = `
            <div class="bp-info">
              <h4>${bp.name}</h4>
              <span class="bp-meta">版本 ${bp.mc_version || '未知'} · ${bp.format.toUpperCase()} · ${bp.size} · ${new Date(bp.upload_time).toLocaleDateString('zh-CN')}</span>
            </div>
            <span class="bp-status ${bp.is_approved ? 'approved' : 'pending'}">${bp.is_approved ? '已通过' : '待审核'}</span>
          `;
          listEl.appendChild(item);
        });

      } catch (err) {
        console.error(err);
        listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div><p>加载失败</p></div>';
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      renderProfile();
    });
  </script>
</body>
</html>
